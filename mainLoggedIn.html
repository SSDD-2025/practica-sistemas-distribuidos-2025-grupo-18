<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Página Principal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="toolbar">
        <div class="logo">
            <img src="logo.png" alt="BookNest Logo">
            <h1>BOOKNEST</h1>
        </div>
        <div class="toolbar-right">
            <input type="text" placeholder="Buscar libros..." class="search-bar">
            <img src="user.png" alt="Usuario" class="user-icon">
            <span class="mis-listas">Mis Listas</span>
        </div>
    </header>
    <main>
        <section class="top-libros">
            <h2>📚 Libros populares de esta semana</h2>
            <div class="libros-container">
                <!-- Aquí se agregarán los libros dinámicamente -->
            </div>
        </section>
    </main>
</body>
</html>
